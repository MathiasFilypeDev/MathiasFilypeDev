name: Atualizar gráfico de linguagens

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install matplotlib requests

      - name: Gerar gráfico
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python linguagens.py

      - name: Commit e push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add linguagens.png
          git commit -m "Atualizar gráfico de linguagens" || echo "Nada para commitar"
          git push
