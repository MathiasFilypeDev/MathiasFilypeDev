name: Atualizar README com gráfico de linguagens

on:
  schedule:
    - cron: "0 0 * * 0"   # roda todo domingo à meia-noite
  workflow_dispatch:       # permite rodar manualmente

permissions:
  contents: write          # permite commit no repositório

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # força uso do Node.js 24

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # atualizado para Node.js 24

      - name: Configurar Python
        uses: actions/setup-python@v5   # atualizado para Node.js 24
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install matplotlib requests

      - name: Gerar gráfico
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python linguagens.py

      - name: Commit e push
        run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add linguagens.gif
        git commit -m "Atualizar gráfico animado de linguagens" || echo "Nada para commitar"
        git pull --rebase origin master || echo "Nada para atualizar"
        git push
